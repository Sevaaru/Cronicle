name: cronicle
description: Cronicle — progreso y listas de anime, películas, series y juegos (offline-first).
publish_to: "none"

version: 1.0.0+10

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  go_router: ^14.6.2

  dio: ^5.7.0
  graphql: ^5.2.0

  drift: ^2.22.1
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.24

  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  connectivity_plus: ^6.1.1
  cached_network_image: ^3.4.1

  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  google_sign_in_platform_interface: ^3.1.0
  googleapis: ^13.2.0
  googleapis_auth: ^2.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0

  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  fpdart: ^1.1.0
  oauth2: ^2.0.3
  flutter_secure_storage: ^9.2.4
  url_launcher: ^6.3.1
  flutter_web_auth_2: ^4.1.0
  http: ^1.2.2
  uuid: ^4.5.1
  image_gallery_saver_plus: ^4.0.1
  file_picker: ^11.0.2
  share_plus: ^12.0.2

  flutter_local_notifications: ^19.0.0
  workmanager: ^0.9.0
  permission_handler: ^12.0.1
  device_info_plus: ^12.4.0
  app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"
  adaptive_icon_foreground_inset: 8
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
